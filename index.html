<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Machine</title>

  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6/babel.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #8d8d8d;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #drum-machine {
      width: 660px;
      max-width: 100%;
      background: #b3b3b3;
      border: 5px solid orange;
      padding: 28px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
      box-shadow: inset 0 0 2px #000;
    }

    .pad-bank {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 12px;
    }

    .drum-pad {
      width: 100px;
      height: 80px;
      background: #808080;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.6rem;
      color: #000;
      box-shadow: 3px 3px 5px #222;
      user-select: none;
    }

    .drum-pad.active {
      background: orange;
      transform: scale(0.98);
      box-shadow: 0 0 5px orange;
    }

    .controls {
      width: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .logo {
      align-self: flex-end;
      font-weight: bold;
      font-style: italic;
      font-size: 1.7rem;
      margin-bottom: 4px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .control-label {
      font-size: 1.05rem;
      font-weight: bold;
    }

    .switch {
      width: 54px;
      height: 26px;
      background: #000;
      padding: 3px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .switch-slider {
      width: 22px;
      height: 20px;
      background: blue;
      transition: transform 0.2s ease;
    }

    .switch.on .switch-slider {
      transform: translateX(26px);
    }

    #display {
      width: 215px;
      min-height: 52px;
      background: #808080;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
      padding: 10px;
    }

    .volume-slider {
      width: 260px;
      accent-color: blue;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #drum-machine {
        flex-direction: column;
        width: 100%;
      }

      .pad-bank {
        grid-template-columns: repeat(3, 90px);
      }

      .drum-pad {
        width: 90px;
        height: 75px;
      }

      .controls {
        width: 100%;
      }

      .volume-slider {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>

  <script type="text/babel">
    const bankOne = [
      {
        key: "Q",
        id: "Heater 1",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Heater-1.mp3"
      },
      {
        key: "W",
        id: "Heater 2",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Heater-2.mp3"
      },
      {
        key: "E",
        id: "Heater 3",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Heater-3.mp3"
      },
      {
        key: "A",
        id: "Heater 4",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Heater-4_1.mp3"
      },
      {
        key: "S",
        id: "Clap",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Heater-6.mp3"
      },
      {
        key: "D",
        id: "Open-HH",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Dsc_Oh.mp3"
      },
      {
        key: "Z",
        id: "Kick-n'-Hat",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Kick_n_Hat.mp3"
      },
      {
        key: "X",
        id: "Kick",
        src: "https://s3.amazonaws.com/freecodecamp/drums/RP4_KICK_1.mp3"
      },
      {
        key: "C",
        id: "Closed-HH",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Cev_H2.mp3"
      }
    ];

    const bankTwo = [
      {
        key: "Q",
        id: "Chord 1",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Chord_1.mp3"
      },
      {
        key: "W",
        id: "Chord 2",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Chord_2.mp3"
      },
      {
        key: "E",
        id: "Chord 3",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Chord_3.mp3"
      },
      {
        key: "A",
        id: "Shaker",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Give_us_a_light.mp3"
      },
      {
        key: "S",
        id: "Open-HH",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Dry_Ohh.mp3"
      },
      {
        key: "D",
        id: "Closed-HH",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Bld_H1.mp3"
      },
      {
        key: "Z",
        id: "Punchy Kick",
        src: "https://s3.amazonaws.com/freecodecamp/drums/punchy_kick_1.mp3"
      },
      {
        key: "X",
        id: "Side Stick",
        src: "https://s3.amazonaws.com/freecodecamp/drums/side_stick_1.mp3"
      },
      {
        key: "C",
        id: "Snare",
        src: "https://s3.amazonaws.com/freecodecamp/drums/Brk_Snr.mp3"
      }
    ];

    function App() {
      const [power, setPower] = React.useState(true);
      const [bank, setBank] = React.useState(true);
      const [display, setDisplay] = React.useState("Heater Kit");
      const [volume, setVolume] = React.useState(0.3);

      const currentBank = bank ? bankOne : bankTwo;

      const playSound = (key) => {
        if (!power) return;

        const pad = currentBank.find((item) => item.key === key);
        if (!pad) return;

        const audio = document.getElementById(key);
        const button = document.getElementById(pad.id.replace(/\s+/g, "-"));

        if (audio) {
          audio.currentTime = 0;
          audio.volume = volume;
          audio.play();
          setDisplay(pad.id);
        }

        if (button) {
          button.classList.add("active");
          setTimeout(() => button.classList.remove("active"), 120);
        }
      };

      React.useEffect(() => {
        const handleKeyDown = (e) => {
          const key = e.key.toUpperCase();
          playSound(key);
        };

        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      });

      const handlePower = () => {
        const newPower = !power;
        setPower(newPower);
        setDisplay(newPower ? (bank ? "Heater Kit" : "Smooth Piano Kit") : "");
      };

      const handleBank = () => {
        if (!power) return;
        const newBank = !bank;
        setBank(newBank);
        setDisplay(newBank ? "Heater Kit" : "Smooth Piano Kit");
      };

      const handleVolume = (e) => {
        const newVolume = Number(e.target.value);
        setVolume(newVolume);
        if (power) {
          setDisplay("Volume: " + Math.round(newVolume * 100));
        }
      };

      return (
        <div id="drum-machine">
          <div className="pad-bank">
            {currentBank.map((pad) => (
              <div
                key={pad.key}
                className="drum-pad"
                id={pad.id.replace(/\s+/g, "-")}
                onClick={() => playSound(pad.key)}
              >
                {pad.key}
                <audio className="clip" id={pad.key} src={pad.src}></audio>
              </div>
            ))}
          </div>

          <div className="controls">
            <div className="logo">FCC</div>

            <div className="control-group">
              <div className="control-label">Power</div>
              <div
                className={`switch ${power ? "on" : ""}`}
                onClick={handlePower}
              >
                <div className="switch-slider"></div>
              </div>
            </div>

            <div id="display">{display}</div>

            <input
              className="volume-slider"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value={volume}
              onChange={handleVolume}
            />

            <div className="control-group">
              <div className="control-label">Bank</div>
              <div
                className={`switch ${bank ? "on" : ""}`}
                onClick={handleBank}
              >
                <div className="switch-slider"></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
